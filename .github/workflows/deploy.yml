name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deploy at a time; don't cancel a running publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify (typecheck · test · lint)
        run: pnpm turbo run typecheck test lint

      - name: Build guides (Docusaurus, served at /nexus/)
        run: pnpm --filter @nexus/site build

      - name: Build Storybook (served at /nexus/storybook/)
        run: pnpm --filter @nexus/ui build:storybook

      - name: Build demo app (served at /nexus/app/)
        run: pnpm --filter @nexus/web build
        env:
          BASE_PATH: /nexus/app/

      - name: Assemble site (guides at root, storybook + demo nested)
        run: |
          rm -rf _site
          mkdir -p _site/storybook _site/app
          cp -r apps/site/build/* _site/
          cp -r packages/ui/storybook-static/* _site/storybook/
          cp -r apps/web/dist/* _site/app/
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
